<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daidtech – Inventaire Vocal</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <span class="logo-name">Daidtech</span>
    <span class="logo-sep">/</span>
    <span class="logo-sub">Inventaire Vocal</span>
    <span class="header-badge">Accessibilité</span>
  </header>

  <!-- LEFT : upload + image -->
  <div class="col-left">

    <div class="upload-card">
      <div class="card-label">Image</div>
      <input type="file" id="chooseFiles" accept="image/*" name="Upload"/>
    </div>

    <div id="imgDiv" class="imageWrapper">
      <div class="img-placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <span>Aucune image sélectionnée</span>
      </div>
      <img id="selectedImg" alt="Image analysée"/>
    </div>

    <button id="identifyObjectsButton" disabled>Analyser l'image</button>

  </div>

  <!-- RIGHT : résultats -->
  <div class="col-right">

    <div class="col-title">Résultats</div>

    <div class="table-wrap">
      <table class="inventaire">
        <caption>Inventaire des prédictions</caption>
        <thead>
          <tr>
            <th scope="col">Qté</th>
            <th scope="col">Objet détecté</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr class="empty-row">
            <td colspan="2">Aucune analyse effectuée</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="phrase-prediction-wrap">
      <div class="phrase-icon">🔊</div>
      <div class="phrase-meta">
        <span class="phrase-label">Synthèse vocale</span>
        <p id="phrase-prediction"></p>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer>
    <div class="status-dot"></div>
    <span class="status-text">TensorFlow.js · COCO-SSD · Modèle prêt</span>
  </footer>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@2.0.0/dist/tf.min.js" type="text/javascript"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<script src="script.js" defer></script>
<script>
  // ── Image display fix ──────────────────────────────────────────────
  // When script.js sets selectedImg.src, show it and hide placeholder
  const _img = document.getElementById('selectedImg');
  const _wrapper = document.getElementById('imgDiv');
  const _origDescriptor = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
  Object.defineProperty(_img, 'src', {
    set(val) {
      _origDescriptor.set.call(this, val);
      if (val) {
        _wrapper.classList.add('has-image');
      } else {
        _wrapper.classList.remove('has-image');
      }
    },
    get() { return _origDescriptor.get.call(this); }
  });
  // Also catch onload in case src is set before this script runs
  _img.addEventListener('load', () => {
    if (_img.src && !_img.src.endsWith(window.location.href)) {
      _wrapper.classList.add('has-image');
    }
  });

  // ── Empty-row fix ──────────────────────────────────────────────────
  // Hide the placeholder row as soon as real rows are inserted
  const _tbody = document.getElementById('tbody');
  const _emptyRow = _tbody.querySelector('.empty-row');
  const _observer = new MutationObserver(() => {
    const hasRealRows = _tbody.querySelectorAll('tr:not(.empty-row)').length > 0;
    if (_emptyRow) _emptyRow.style.display = hasRealRows ? 'none' : '';
  });
  _observer.observe(_tbody, { childList: true });
</script>
</body>
</html>
